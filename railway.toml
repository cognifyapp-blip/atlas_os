[build]
builder = "nixpacks"
buildCommand = "npx prisma generate && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[nixpacks]
aptPkgs = ["openssl"]

[nixpacks.variables]
NIXPACKS_NODE_VERSION = "22"
